<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dungeon Critters Bestiary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dex.css" />
</head>
<body data-page="index">
  <header>
    <div class="header-left">
      <h1 data-i18n="title">Dungeon Critters Bestiary</h1>
      <p data-i18n="subtitle">Browse critters from the game data.</p>
    </div>
    <div class="lang-toggle" role="group" aria-label="Language">
      <button class="lang-btn active" data-lang="en" aria-pressed="true">EN</button>
      <button class="lang-btn" data-lang="es" aria-pressed="false">ES</button>
    </div>
  </header>

  <nav class="page-tabs" aria-label="Sections">
    <a class="page-tab active" href="index.html" data-i18n="tab_bestiary">Bestiary</a>
    <a class="page-tab" href="types.html" data-i18n="tab_types">Type Info</a>
  </nav>

  <section class="controls">
    <input
      id="search"
      type="search"
      placeholder="Search critter name…"
      aria-label="Search critter by name"
      data-i18n-placeholder="search_placeholder"
    />
    <select id="typeFilterA" aria-label="Filter by first type">
      <option value="" data-i18n="any_type">Any type</option>
    </select>
    <select id="typeFilterB" aria-label="Filter by second type">
      <option value="" data-i18n="any_type2">Any second type</option>
    </select>
  </section>

  <main>
    <div id="status" data-i18n="loading">Loading critters…</div>
    <div id="critterGrid" class="grid" hidden></div>
  </main>

  <script src="dex.js" defer></script>
</body>
</html>
